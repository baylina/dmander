{% extends "base.html" %}

{% block content %}
<section class="section-head">
  <div>
    <p class="eyebrow">Área privada</p>
    <h1>Mis Ofertas</h1>
  </div>
</section>

<section class="card dual-shell">
  <aside class="tri-col tri-col-demand">
    <div class="tri-scroll" id="offers-demand-list"></div>
  </aside>
  <section class="tri-chat">
    <div id="offers-chat-empty" class="chat-empty"><p>Selecciona una demanda de la izquierda para ver la conversación.</p></div>
    <div id="offers-chat-panel" hidden>
      <header class="chat-head" id="offers-chat-head"></header>
      <div class="chat-scroll" id="offers-chat-messages"></div>
      <form id="offers-chat-form" class="chat-compose compact-compose">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <textarea name="body" rows="2" maxlength="200" placeholder="Responder..." required></textarea>
        <button type="submit" class="button button-primary compact-send">Enviar</button>
      </form>
    </div>
  </section>
</section>

<script>
  (() => {
    const currentUserId = {{ current_user.id if current_user else 'null' }};
    const listEl = document.getElementById('offers-demand-list');
    const chatEmpty = document.getElementById('offers-chat-empty');
    const chatPanel = document.getElementById('offers-chat-panel');
    const chatHead = document.getElementById('offers-chat-head');
    const chatMessages = document.getElementById('offers-chat-messages');
    const chatForm = document.getElementById('offers-chat-form');
    let workspace = { my_offers_active: [] };
    let selectedOfferId = null;

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const formatDate = (value) => value ? new Date(value).toLocaleString('es-ES', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }) : '';
    const activeOffer = () => workspace.my_offers_active.find((o) => o.offer_id === selectedOfferId);

    const renderList = () => {
      listEl.innerHTML = (workspace.my_offers_active || []).map((o) => `
        <div class="thread-row-shell">
          <button class="thread-preview compact-row ${selectedOfferId === o.offer_id ? 'active' : ''}" data-offer-id="${o.offer_id}">
            <div class="thread-preview-copy full-copy">
              <strong>${esc(o.demand_summary)}</strong>
            </div>
            <div class="thread-preview-meta">
              ${o.unread_count > 0 ? `<span class="badge badge-hot">${o.unread_count}</span>` : ''}
            </div>
          </button>
          {% if debug_normalization %}
            <button type="button" class="debug-json-trigger" data-debug-demand-id="${o.demand_id}">json</button>
          {% endif %}
        </div>
      `).join('') || '<div class="chat-empty"><p>Aún no tienes ofertas activas.</p></div>';
    };

    const openDebugDemand = (demandId) => {
      const offer = (workspace.my_offers_active || []).find((item) => item.demand_id === Number(demandId));
      if (!offer || !window.dmanderDebugJson) return;
      window.dmanderDebugJson.open(offer.normalized_payload || {}, `Normalized demand JSON · ${offer.demand_summary}`);
    };

    {% if debug_normalization %}
    listEl.addEventListener('click', (event) => {
      const debugButton = event.target.closest('[data-debug-demand-id]');
      if (!debugButton) return;
      event.preventDefault();
      event.stopPropagation();
      openDebugDemand(debugButton.dataset.debugDemandId);
    });
    {% endif %}

    const renderThread = () => {
      const offer = activeOffer();
      if (!offer) {
        chatEmpty.hidden = false;
        chatPanel.hidden = true;
        return;
      }
      chatEmpty.hidden = true;
      chatPanel.hidden = false;
      chatHead.innerHTML = `<div><strong>${esc(offer.demand_summary)}</strong><p>Conversación activa</p></div>`;
      chatMessages.innerHTML = (offer.messages || []).map((m) => `
        <div class="thread-message ${m.sender_user_id === currentUserId ? 'mine' : ''}">
          <div class="thread-meta"><strong>${esc(m.sender_name)}</strong><span>${formatDate(m.created_at)}</span></div>
          <p>${esc(m.body)}</p>
        </div>
      `).join('');
      chatForm.dataset.offerId = offer.offer_id;
      offer.unread_count = 0;
      renderList();
    };

    const fetchWorkspace = async () => {
      const response = await fetch('/api/workspace', { headers: { Accept: 'application/json' }});
      if (!response.ok) return;
      workspace = await response.json();
      if (selectedOfferId && !activeOffer()) selectedOfferId = null;
      renderList();
      renderThread();
    };

    listEl.addEventListener('click', async (event) => {
      const button = event.target.closest('[data-offer-id]');
      if (!button) return;
      const offerId = Number(button.dataset.offerId);
      selectedOfferId = selectedOfferId === offerId ? null : offerId;
      renderList();
      renderThread();
    });

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const offerId = chatForm.dataset.offerId;
      if (!offerId) return;
      const formData = new FormData(chatForm);
      const response = await fetch(`/api/offers/${offerId}/messages`, {
        method: 'POST',
        body: formData,
        headers: { Accept: 'application/json' },
      });
      if (!response.ok) return;
      const data = await response.json();
      const idx = workspace.my_offers_active.findIndex((o) => o.offer_id === Number(offerId));
      if (idx >= 0) workspace.my_offers_active[idx] = { ...workspace.my_offers_active[idx], ...data.thread, unread_count: 0 };
      chatForm.reset();
      renderThread();
    });

    fetchWorkspace();
  })();
</script>
{% endblock %}
